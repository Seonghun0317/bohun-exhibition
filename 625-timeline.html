<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<script>if(navigator.maxTouchPoints>0||'ontouchstart' in window){document.querySelector('meta[name=viewport]').content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no';}</script>
<title>1950–1953, 하나의 긴 선 위에 기록된 1129일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #06080E;
  --text-1:   #D2CCB8;
  --text-2:   #5C6874;
  --gold:     #B49048;
  --gold-dim: rgba(180,144,72,.18);
  --border:   rgba(148,138,112,.18);
  --panel-bg: rgba(8,10,17,.98);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

html,body {
  width:1280px; height:160px;
  overflow:hidden;
  background:var(--bg);
  color:var(--text-1);
  font-family:'Noto Serif KR',serif;
  user-select:none;
}

#top-rule, #bottom-rule {
  position:fixed; left:0; right:0; height:3px;
  background:linear-gradient(90deg,
    transparent 0%, rgba(180,144,72,.55) 8%,
    rgba(180,144,72,.92) 30%, rgba(180,144,72,.92) 70%,
    rgba(180,144,72,.55) 92%, transparent 100%);
  z-index:500; pointer-events:none;
}
#top-rule    { top:0; }
#bottom-rule { bottom:0; }

#grain    { position:fixed; inset:0; width:1280px; height:160px; z-index:100; pointer-events:none; opacity:.05; }
#scanlines {
  position:fixed; inset:0; width:1280px; height:160px; z-index:98; pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.026) 2px, rgba(0,0,0,.026) 3px);
}
#vignette     { position:fixed; inset:0; z-index:99;  pointer-events:none; background:radial-gradient(ellipse at center, transparent 10%, rgba(3,4,9,.68) 100%); }
#fade-overlay {
  position:fixed; inset:0; z-index:200; background:#050609;
  opacity:0; pointer-events:none; transition:opacity .55s ease;
}
#fade-overlay.active { opacity:1; pointer-events:all; }

/* ══ 레이아웃 ══ */
#app {
  position:relative; z-index:10;
  width:1280px; height:160px; display:flex;
  opacity:0; transition:opacity 1.1s ease;
}
#app.ready { opacity:1; }

/* ══ 왼쪽 패널 ══ */
#panel-left {
  width:20%; height:160px;
  background:var(--panel-bg);
  border-right:1px solid var(--border);
  padding:10px 14px 8px 17px;
  display:flex; flex-direction:column;
  position:relative; overflow:hidden; flex-shrink:0;
}
#panel-left::before {
  content:''; position:absolute; top:0; left:0; width:3px; height:100%;
  background:linear-gradient(180deg, var(--gold) 0%, rgba(180,144,72,.15) 100%);
}
.l-label {
  font-family:'Share Tech Mono',monospace;
  font-size:9px; letter-spacing:3.5px;
  color:var(--text-2); opacity:.75; margin-bottom:3px; flex-shrink:0;
}
.l-title {
  font-size:20px; font-weight:700;
  color:var(--text-1); line-height:1.05; letter-spacing:.6px; flex-shrink:0;
}
.l-sep { width:100%; height:1px; background:var(--border); margin:5px 0 6px; flex-shrink:0; }

/* ══ 왼쪽 장면 정보 ══ */
#l-scene-name {
  font-size:13px; font-weight:700;
  color:var(--text-1); letter-spacing:.5px; line-height:1.2;
  margin-bottom:1px; flex-shrink:0;
}
#l-scene-desc {
  font-family:'Share Tech Mono',monospace;
  font-size:8px; letter-spacing:1.2px;
  color:rgba(180,144,72,.65); line-height:1.4;
  margin-bottom:5px; flex-shrink:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* ══ 타임라인 세그먼트 바 ══ */
#tl-bars {
  display:flex; gap:3px; align-items:flex-end;
  flex-shrink:0; margin-bottom:5px; width:100%; height:11px;
}
.tl-bar {
  flex:1; height:3px;
  background:rgba(180,144,72,.12);
  border-top:1px solid rgba(180,144,72,.18);
  transition:height .4s ease, background .4s ease, box-shadow .4s ease;
}
.tl-bar.done {
  height:3px;
  background:rgba(180,144,72,.45);
  border-top-color:rgba(180,144,72,.6);
}
.tl-bar.current {
  height:9px;
  background:var(--gold);
  border-top-color:var(--gold);
  animation:bar-pulse 2.2s ease-in-out infinite;
}

@keyframes bar-pulse {
  0%,100% { box-shadow:0 0 5px rgba(180,144,72,.5); }
  50%     { box-shadow:0 0 10px rgba(180,144,72,.95), 0 -3px 6px rgba(180,144,72,.4); }
}

.l-counter {
  font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px;
  color:var(--gold); opacity:.8; flex-shrink:0; margin-top:auto;
}
.l-year {
  font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:4px;
  color:var(--text-2); opacity:.5; flex-shrink:0; margin-top:2px;
}

/* ══ 중앙 패널 ══ */
#panel-center {
  width:55%; height:160px;
  background:#05080E;
  position:relative; overflow:hidden; flex-shrink:0;
}
#scene-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:0; }

/* 사진 레이어 — 보훈 사이트와 동일한 방식 */
#scene-bg {
  position:absolute; inset:0;
  background-size:cover; background-position:center center;
  background-color:transparent;
  z-index:1; opacity:0;
  transition:opacity 0.8s ease;
  filter:brightness(1.30) contrast(1.08) saturate(.65);
}
#scene-bg::after {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 28% 40%, rgba(180,144,72,.06) 0%, transparent 48%),
    linear-gradient(90deg, rgba(6,9,15,.38) 0%, transparent 30%),
    rgba(5,8,13,.35);
  pointer-events:none;
}

#panel-center::after {
  content:''; position:absolute; left:0; right:0; bottom:0; height:65%;
  background:linear-gradient(to bottom,
    transparent 0%, rgba(5,8,14,.62) 48%, rgba(4,7,11,.95) 100%);
  z-index:3; pointer-events:none;
}

/* 장면 진행 바 (transform 방식 — 성능 최적) */
#scene-progress {
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, rgba(180,144,72,.5), rgba(220,178,88,.95));
  z-index:5; transform:scaleX(0); transform-origin:left;
  box-shadow:0 0 6px rgba(180,144,72,.4);
}

.c-content {
  position:absolute; inset:0; z-index:4;
  display:flex; flex-direction:column;
  padding:10px 20px 12px;
}
.c-counter {
  font-family:'Share Tech Mono',monospace;
  font-size:10px; letter-spacing:4.5px;
  color:var(--gold); opacity:.72; line-height:1.2; flex-shrink:0;
}
.c-sep {
  width:44px; height:1px;
  background:linear-gradient(90deg, var(--gold), rgba(180,144,72,.1));
  margin:5px 0 3px; flex-shrink:0;
}
#c-hist {
  font-family:'Share Tech Mono',monospace;
  font-size:10.5px; font-style:italic;
  color:rgba(188,155,80,.75); letter-spacing:.3px; line-height:1.2;
  margin-top:auto; flex-shrink:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
  opacity:0; transition:opacity .6s ease .35s;
}
#c-hist.show { opacity:1; }

#doc-stamp {
  position:absolute; right:10px; bottom:7px;
  font-family:'Share Tech Mono',monospace;
  font-size:6.5px; letter-spacing:1.2px;
  color:rgba(180,144,72,.12); line-height:1.9; text-align:right;
  transform:rotate(.4deg);
  border:1px solid rgba(180,144,72,.05); padding:2px 4px;
  pointer-events:none; z-index:5;
}

/* ══ 오른쪽 패널 ══ */
#panel-right {
  width:25%; height:160px;
  background:var(--panel-bg);
  border-left:1px solid var(--border);
  padding:10px 14px 10px 16px;
  display:flex; flex-direction:column; justify-content:center;
  flex-shrink:0; position:relative; overflow:hidden;
}
#panel-right::before {
  content:''; position:absolute; top:0; right:0; width:2px; height:100%;
  background:linear-gradient(180deg, var(--gold) 0%, rgba(180,144,72,.1) 100%);
}
#r-date {
  font-family:'Bebas Neue',sans-serif;
  font-size:17px; letter-spacing:3.5px;
  color:var(--gold); line-height:1.1; flex-shrink:0; margin-bottom:4px;
  opacity:0; transition:opacity .5s ease;
}
#r-date.show { opacity:1; }
.r-rule { width:38px; height:1px; background:linear-gradient(90deg, var(--gold), transparent); margin-bottom:5px; flex-shrink:0; }
#r-title {
  font-size:25px; font-weight:700;
  color:var(--text-1); line-height:1.1; letter-spacing:.5px;
  flex-shrink:0; margin-bottom:5px;
  overflow:hidden;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  text-shadow:0 1px 28px rgba(0,0,0,1), 0 0 64px rgba(0,0,0,.9);
  opacity:0; transition:opacity .5s ease .12s;
}
#r-title.show { opacity:1; }
#r-desc {
  font-size:12.5px; font-weight:300; font-style:italic;
  color:rgba(210,204,184,.72); line-height:1.58; letter-spacing:.25px;
  flex-shrink:0;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  text-shadow:0 1px 12px rgba(0,0,0,.9);
  opacity:0; transition:opacity .5s ease .28s;
}
#r-desc.show { opacity:1; }

/* ══ 오프닝 오버레이 ══ */
#opening-overlay {
  position:fixed; inset:0; width:1280px; height:160px; background:#040508;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  z-index:300; text-align:center;
  opacity:0; transition:opacity .9s ease;
}
#opening-overlay.show { opacity:1; }
.o-label {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:6px;
  color:var(--gold); opacity:.7; margin-bottom:6px;
  transform:translateY(4px); transition:transform 1s ease .1s;
}
.o-year  {
  font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:10px;
  color:rgba(200,162,72,.9); margin-bottom:3px;
  transform:translateY(5px); transition:transform 1s ease .25s;
}
.o-title {
  font-size:34px; font-weight:700; color:var(--text-1);
  line-height:1.1; letter-spacing:1.8px;
  text-shadow:0 2px 40px rgba(0,0,0,1), 0 0 80px rgba(180,144,72,.15);
  transform:translateY(6px); transition:transform 1s ease .45s;
}
.o-divider { width:64px; height:1px; background:linear-gradient(90deg, transparent, var(--gold), transparent); margin:8px auto 7px; opacity:.65; }
.o-sub {
  font-size:13px; font-weight:300; color:rgba(160,154,138,.78); letter-spacing:.6px;
  transform:translateY(4px); transition:transform 1s ease .75s;
}
#opening-overlay.show .o-label,
#opening-overlay.show .o-year,
#opening-overlay.show .o-title,
#opening-overlay.show .o-sub { transform:translateY(0); }

/* ══ 엔딩 오버레이 ══ */
#ending-overlay {
  position:fixed; inset:0; width:1280px; height:160px;
  background:rgba(3,4,9,.99);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  z-index:160; text-align:center;
  opacity:0; transition:opacity 1s ease;
}
#ending-overlay.visible { display:flex; }
#ending-overlay.show    { opacity:1; }
#e-year {
  font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:5px;
  color:var(--gold); opacity:0; transition:opacity .9s ease;
}
#e-year.show { opacity:.85; }
#e-main {
  font-size:22px; font-weight:600; color:var(--text-1);
  letter-spacing:.6px; line-height:1.42;
  text-shadow:0 0 50px rgba(180,144,72,.2), 0 2px 20px rgba(0,0,0,.9);
  opacity:0; transition:opacity .9s ease .55s;
}
#e-main.show { opacity:1; }
#e-sub {
  font-size:13px; font-weight:300; font-style:italic;
  color:rgba(180,144,72,.62); letter-spacing:.35px;
  opacity:0; transition:opacity .9s ease 1.3s;
}
#e-sub.show { opacity:1; }

/* ══ 모바일 ══ */
@media (max-width:767px) {
  html,body { width:100%; height:100vh; height:100dvh; }
  #grain,#scanlines { width:100%; height:100%; }
  #vignette,#fade-overlay { height:100vh; height:100dvh; }
  #app { width:100%; height:100vh; height:100dvh; flex-direction:column; }

  #panel-left {
    width:100%; height:auto; flex:0 0 auto;
    flex-direction:row; align-items:center; gap:10px; flex-wrap:nowrap;
    padding:7px 14px 7px 18px; border-right:none; border-bottom:1px solid var(--border);
  }
  #panel-left::before { width:100%; height:2px; top:0; left:0; right:auto; background:linear-gradient(90deg, var(--gold), rgba(180,144,72,.15)); }
  .l-label,.l-sep,.l-year,#l-scene-name,#l-scene-desc { display:none; }
  .l-title  { font-size:13px; letter-spacing:.3px; }
  #tl-bars  { margin-bottom:0; gap:3px; height:9px; }
  .tl-bar.current { height:7px; }
  .l-counter { margin-top:0; }

  #panel-center { width:100%; height:auto; flex:1 1 0; min-height:0; }
  .c-content    { padding:8px 14px 10px; }
  .c-counter    { font-size:9px; letter-spacing:3px; }
  .c-sep        { margin:3px 0 2px; }
  #doc-stamp    { display:none; }

  #panel-right {
    width:100%; height:auto; flex:0 0 auto;
    border-left:none; border-top:1px solid var(--border);
    padding:10px 16px 14px; justify-content:flex-start;
  }
  #panel-right::before { display:none; }
  #r-date  { font-size:13px; letter-spacing:2.5px; margin-bottom:3px; }
  #r-title { font-size:20px; margin-bottom:4px; }
  #r-desc  { font-size:12px; }

  #opening-overlay { width:100%; height:100vh; height:100dvh; }
  .o-year { font-size:16px; letter-spacing:7px; }
  .o-title { font-size:22px; }
  .o-sub { font-size:12px; }
  #ending-overlay { width:100%; height:100vh; height:100dvh; }
  #e-main { font-size:17px; padding:0 20px; }
  #e-sub  { font-size:11.5px; }
}
</style>
</head>
<body>

<div id="top-rule"></div>
<div id="bottom-rule"></div>
<canvas id="grain"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="fade-overlay"></div>

<!-- ══ 오프닝 ══ -->
<div id="opening-overlay">
  <div class="o-label">6.25 전쟁 전체 타임라인 · 자동 재생 전시</div>
  <div class="o-year">1950 — 1953</div>
  <div class="o-title">하나의 긴 선 위에 기록된 1129일</div>
  <div class="o-divider"></div>
  <div class="o-sub">1950년 6월 25일 새벽, 전쟁이 시작되었다</div>
</div>

<!-- ══ 메인 ══ -->
<div id="app">

  <!-- 왼쪽: 타임라인 인디케이터 -->
  <div id="panel-left">
    <div class="l-label">6.25 전쟁 타임라인</div>
    <div class="l-title">1950–1953</div>
    <div class="l-sep"></div>
    <div id="l-scene-name"></div>
    <div id="l-scene-desc"></div>
    <div id="tl-bars"></div>
    <div class="l-counter" id="l-counter">SCENE 01 / 09</div>
    <div class="l-year">1129 DAYS</div>
  </div>

  <!-- 중앙: 장면 시각화 -->
  <div id="panel-center">
    <canvas id="scene-canvas"></canvas>
    <div id="scene-bg"></div>
    <div id="scene-progress"></div>
    <div id="doc-stamp"></div>
    <div class="c-content">
      <div class="c-counter" id="c-counter">SCENE  01 / 09</div>
      <div class="c-sep"></div>
      <div id="c-hist"></div>
    </div>
  </div>

  <!-- 오른쪽: 장면 정보 -->
  <div id="panel-right">
    <div id="r-date"></div>
    <div class="r-rule"></div>
    <div id="r-title"></div>
    <div id="r-desc"></div>
  </div>

</div>

<!-- ══ 엔딩 ══ -->
<div id="ending-overlay">
  <div id="e-year">1953 · 07 · 27 &nbsp;·&nbsp; 정전협정 조인</div>
  <div id="e-main">우리가 기억해야 할 이유는<br>아직 끝나지 않았기 때문이다</div>
  <div id="e-sub">1129일 · 국군·유엔군 전사자 약 178,000명 · 남한 민간인 피해 약 99만 명</div>
</div>

<script>
/* ═══════════════════════════════════════════
   장면 데이터 — 사실 검증 완료
   참고: 국방부 군사편찬연구소 / 전쟁기념관 공식 자료
═══════════════════════════════════════════ */
const SCENES = [
  {
    date: '1950 · 06 · 25',
    title: '전쟁의 시작',
    desc: '북한군의 기습 남침으로 전쟁이 시작되었다',
    // 사실: 1950년 6월 25일 새벽 4시, 38선 전역 동시 기습. 242,000명 병력 남침.
    histNote: '새벽 4시, 38선 전역에서 북한군 242,000명이 일제히 남침을 개시했다',
    stamp: '06.25 · 남침 개시', duration: 5800,
  },
  {
    date: '1950 · 06 · 28',
    title: '서울 함락',
    desc: '수많은 시민들이 피난길에 올랐다',
    // 사실: 개전 3일 만에 서울 함락. 6.28 새벽 한강 다리 폭파(아군 조기 폭파로 시민 500여 명 희생).
    histNote: '개전 3일 만에 서울이 함락됐다 — 한강 다리 폭파로 시민들이 고립되었다',
    stamp: '06.28 · 서울 함락', duration: 5500,
  },
  {
    date: '1950 · 08',
    title: '낙동강 방어선',
    desc: '마지막 방어선을 끝까지 지켜냈다',
    // 사실: 1950년 8월 1일 낙동강 방어선(워커 라인) 구축. 총 240km 방어선.
    histNote: '워커 장군이 구축한 낙동강 방어선 240km — 최후의 한 뼘을 지켜냈다',
    stamp: '08 · 낙동강 방어', duration: 5500,
  },
  {
    date: '1950 · 09 · 15',
    title: '인천상륙작전',
    desc: '전세를 바꾼 결정적 반격',
    // 사실: 맥아더 지휘, X군단 75,000명 인천 상륙. 성공 확률 1/5000 이라 불릴 만큼 기습적.
    histNote: '맥아더가 지휘한 75,000명의 상륙 — 전쟁의 흐름이 하루아침에 바뀌었다',
    stamp: '09.15 · 인천 상륙', duration: 5800,
  },
  {
    date: '1950 · 09 · 28',
    title: '서울 수복',
    desc: '서울을 다시 되찾았다',
    // 사실: 인천 상륙 13일 만에 서울 수복. 이후 10월 1일 국군 38선 돌파.
    histNote: '상륙 13일 만에 서울을 탈환했다 — 10월 1일 국군이 38선을 돌파했다',
    stamp: '09.28 · 서울 수복', duration: 5200,
  },
  {
    date: '1950 · 10 · 19',
    title: '중공군 개입',
    desc: '다시 찾아온 위기 — 전쟁이 달라졌다',
    // 사실: 10월 19일 중공군(중국인민지원군) 압록강 도하 시작. 약 26만 명 1차 투입.
    // 10월 25일 1차 공세 시작. "30만"은 2차 공세 포함 누적 수치.

/* ═══════════════════════════════════════════
   Seeded random (결정적 무작위)
═══════════════════════════════════════════ */
function sr(seed) { const x = Math.sin(seed+1)*43758.5453; return x - Math.floor(x); }

    const dawn=c.createRadialGradient(w*.5,0,0,w*.5,0,h*1.6);
    dawn.addColorStop(0,'rgba(125,108,65,.12)'); dawn.addColorStop(.4,'rgba(75,65,40,.06)'); dawn.addColorStop(1,'transparent');
    c.fillStyle=dawn; c.fillRect(0,0,w,h);
    c.fillStyle='#080B10'; c.fillRect(0,h*.62,w,h*.38);
    // 회의 테이블
    const ty=h*.56; const tw=w*.52; const tx=(w-tw)/2;
    c.fillStyle='#050810'; c.fillRect(tx,ty,tw,h*.12);
    c.strokeStyle='rgba(100,88,55,.14)'; c.lineWidth=1; c.strokeRect(tx,ty,tw,h*.12);
    // 착석 인물
    c.fillStyle='rgba(3,4,9,.82)';
    for(let i=0;i<7;i++){
      const px=tx+tw*.07+i*tw*.135; const sh=h*.1;
      c.fillRect(px-5,ty-sh,10,sh); c.beginPath(); c.arc(px,ty-sh-sh*.4,sh*.35,0,Math.PI*2); c.fill();
    }
    // 문서
    c.fillStyle='rgba(178,168,138,.06)';
    for(let i=0;i<4;i++){ c.fillRect(tx+tw*.07+i*tw*.22,ty+3,tw*.12,h*.06); }
    c.fillStyle='rgba(165,180,200,.28)';
    for(let i=0;i<40;i++){ c.beginPath(); c.arc(sr(i*273)*w,sr(i*847)*h*.58,sr(i*19)*.55+.2,0,Math.PI*2); c.fill(); }
  },
];

/* ═══════════════════════════════════════════
   사진 로드 — 사전 로드 + 씬별 밝기 조정
   깜빡임 방지: 이미지를 미리 캐싱해 전환 시 즉시 표시
═══════════════════════════════════════════ */
const IMG_FORMATS = ['png', 'jpg', 'jpeg', 'webp'];

// 씬별 밝기 — scene1(흑백, 어두움)은 크게, 나머지는 소폭 증가
const SCENE_BRIGHTNESS = [1.60, 1.30, 1.28, 1.28, 1.28, 1.28, 1.30, 1.40, 1.28];

// 사전 로드된 이미지 URL 캐시
const preloadedSrc = new Array(SCENES.length).fill(null);

// 페이드 전환 중 플래그 — 전환 중엔 bg 즉시 표시
let isFading = false;

function tryLoad(idx, formats, done) {
  if (!formats.length) { done(null); return; }
  const [fmt, ...rest] = formats;
  const img = new Image();
  img.onload  = () => done(img.src);
  img.onerror = () => tryLoad(idx, rest, done);
  img.src = `assets/images/625/scene${idx+1}.${fmt}`;
}

function preloadScene(idx) {
  if (preloadedSrc[idx] !== null) return; // 이미 로드됨
  preloadedSrc[idx] = '';                 // 로드 중 표시 (중복 방지)
  tryLoad(idx, IMG_FORMATS, src => {
    preloadedSrc[idx] = src || '';
  });
}

function loadBg(idx) {
  const bright = SCENE_BRIGHTNESS[idx] ?? 1.30;
  elBg.style.filter = `brightness(${bright}) contrast(1.08) saturate(.65)`;

  const src = preloadedSrc[idx];

  // 아직 로드 안 됐으면 로드 후 처리
  if (!src) {
    elBg.style.transition = 'none';
    elBg.style.opacity    = '0';
    elBg.style.backgroundImage = 'none';
    tryLoad(idx, IMG_FORMATS, loaded => {
      if (!loaded) return;
      preloadedSrc[idx] = loaded;
      elBg.style.backgroundImage = `url('${loaded}')`;
      if (isFading) {
        elBg.style.opacity = '1';
      } else {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          elBg.style.transition = 'opacity 0.8s ease';
          elBg.style.opacity    = '1';
        }));
      }
    });
    return;
  }

  elBg.style.backgroundImage = src ? `url('${src}')` : 'none';

  if (isFading) {
    // 페이드 오버레이 뒤에 있으므로 즉시 불투명하게 → 오버레이 걷히면 바로 보임
    elBg.style.transition = 'none';
    elBg.style.opacity    = src ? '1' : '0';
  } else {
    // 일반 전환 — 부드럽게 페이드인
    elBg.style.transition = 'none';
    elBg.style.opacity    = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      elBg.style.transition = 'opacity 0.8s ease';
      elBg.style.opacity    = src ? '1' : '0';
    }));
  }
}

/* ═══════════════════════════════════════════
   장면 표시
═══════════════════════════════════════════ */
function showScene(idx) {
  const s = SCENES[idx];

  /* 타임라인 세그먼트 바 */
  SCENES.forEach((_,i) => {
    const b = $(`bar-${i}`);
    if (!b) return;
    b.className = 'tl-bar' + (i < idx ? ' done' : i === idx ? ' current' : '');
  });
  const label = `SCENE ${String(idx+1).padStart(2,'0')} / 09`;
  elLCntr.textContent = label;
  elCCntr.textContent = `SCENE ${String(idx+1).padStart(2,'0')} / 09`;
  if (elStamp) elStamp.innerHTML = `6.25 전쟁<br>${s.stamp}`;
  if (elLSceneName) elLSceneName.textContent = s.title;
  if (elLSceneDesc) elLSceneDesc.textContent  = s.stamp;

  /* 텍스트 fade-in */
  [elDate, elTitle, elDesc, elHist].forEach(el => el.classList.remove('show'));
  elDate.textContent  = s.date;
  elTitle.textContent = s.title;
  elDesc.textContent  = s.desc;
  elHist.textContent  = s.histNote;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    elDate.classList.add('show');
    elTitle.classList.add('show');
    elDesc.classList.add('show');
    elHist.classList.add('show');
  }));

  /* 진행 바 — transform 방식 */
  elProg.style.transition = 'none';
  elProg.style.transform  = 'scaleX(0)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    elProg.style.transition = `transform ${s.duration}ms linear`;
    elProg.style.transform  = 'scaleX(1)';
  }));

  /* 캔버스 */
  resize();
  painters[idx](ctx, elCvs.width, elCvs.height);
  loadBg(idx);
}

/* ═══════════════════════════════════════════
   자동 시퀀스 (버튼 없음, 완전 자동 반복)
═══════════════════════════════════════════ */
let currentIdx = 0;
let seqTimer   = null;
const FADE     = 560;  // ms, 페이드 전환 시간

function fadeTo(fn) {
  isFading = true;
  elFade.classList.add('active');
  setTimeout(() => {
    fn();
    setTimeout(() => {
      elFade.classList.remove('active');
      isFading = false;
    }, 60);
  }, FADE);
}

function scheduleNext() {
  clearTimeout(seqTimer);
  // 다음 장면 이미지 미리 로드 — 타이머 도중 로딩 완료되도록
  const next = currentIdx + 1;
  if (next < SCENES.length) preloadScene(next);
  seqTimer = setTimeout(advance, SCENES[currentIdx].duration);
}

function advance() {
  const next = currentIdx + 1;
  if (next >= SCENES.length) { endSequence(); return; }
  fadeTo(() => { currentIdx = next; showScene(currentIdx); scheduleNext(); });
}

function endSequence() {
  fadeTo(() => {
    // 블랙 오버레이 뒤에서 즉시 불투명하게 준비 — Bug2 수정
    elEnd.classList.add('visible');
    elEnd.style.transition = 'none';
    elEnd.style.opacity    = '1';
    elEnd.classList.add('show');
    // 텍스트는 블랙 오버레이가 걷힌 뒤 시차 등장
    setTimeout(() => $('e-year').classList.add('show'), 350);
    setTimeout(() => $('e-main').classList.add('show'), 900);
    setTimeout(() => $('e-sub').classList.add('show'),  1700);

    seqTimer = setTimeout(() => {
      // 블랙 커튼을 먼저 내린 뒤 엔딩 정리 → scene9 캔버스 노출 없음
      fadeTo(() => {
        elEnd.classList.remove('show', 'visible');
        ['e-year','e-main','e-sub'].forEach(id => $(id).classList.remove('show'));
        elEnd.style.transition = '';
        elEnd.style.opacity    = '';
        currentIdx = 0;
        startOpening();
      });
    }, 7500);
  });
}

function startOpening() {
  elOpn.style.display = 'flex';
  if (isFading) {
    // 루프백(엔딩→처음): 블랙 커튼 뒤에서 즉시 불투명하게 표시
    elOpn.style.transition = 'none';
    elOpn.style.opacity    = '1';
    elOpn.classList.add('show');
  } else {
    // 최초 로드: CSS 페이드인
    requestAnimationFrame(() => requestAnimationFrame(() => elOpn.classList.add('show')));
  }
  seqTimer = setTimeout(() => {
    // 오프닝 종료도 fadeTo(블랙 커튼)로 처리
    // → 커튼 뒤에서 씬 준비 후 한 번에 드러남, 버벅임 없음
    fadeTo(() => {
      elOpn.classList.remove('show');
      elOpn.style.transition = 'none';
      elOpn.style.opacity    = '';
      elOpn.style.display    = 'none';
      showScene(currentIdx);
      scheduleNext();
    });
  }, 4800);
}

/* ═══════════════════════════════════════════
   필름 그레인
═══════════════════════════════════════════ */
function initGrain() {
  const cv = $('grain'); const g = cv.getContext('2d');
  function r() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
  r(); window.addEventListener('resize', r);
  let tick = 0;
  (function anim() {
    if (++tick % 3 === 0) {
      const img = g.createImageData(cv.width, cv.height); const d = img.data;
      for (let i = 0; i < d.length; i += 4) { const v=(Math.random()*255)|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
      g.putImageData(img, 0, 0);
    }
    requestAnimationFrame(anim);
  })();
}

/* ═══════════════════════════════════════════
   초기화
═══════════════════════════════════════════ */
window.addEventListener('resize', () => {
  if (currentIdx >= 0 && currentIdx < SCENES.length) {
    resize(); painters[currentIdx](ctx, elCvs.width, elCvs.height);
  }
});

/* ═══════════════════════════════════════════
   화면 켜짐 유지 (Wake Lock)
   — 전시 중 화면이 자동으로 꺼지지 않도록
═══════════════════════════════════════════ */
async function keepScreenAwake() {
  if (!('wakeLock' in navigator)) return;
  try {
    let lock = await navigator.wakeLock.request('screen');
    document.addEventListener('visibilitychange', async () => {
      if (lock.released && document.visibilityState === 'visible') {
        lock = await navigator.wakeLock.request('screen');
      }
    });
  } catch(e) {}
}

function init() {
  keepScreenAwake();
  initGrain();
  // 오프닝 중 미리 로드 (4.8s 여유)
  preloadScene(0);
  preloadScene(1);
  resize();
  painters[0](ctx, elCvs.width, elCvs.height);
  elApp.classList.add('ready');
  startOpening();
}

init();
</script>
